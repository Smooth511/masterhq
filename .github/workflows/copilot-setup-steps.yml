name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called copilot-setup-steps or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Inject MK2PK keys
        env:
          # Primary key names (as documented in INSTALL.md)
          _PK1: ${{ secrets.MK2PK1 }}
          _PK2: ${{ secrets.MK2PK2 }}
          _PHANTOM_TOKEN: ${{ secrets.MK2_PHANTOM_TOKEN }}
          # Alternative names the user might have used
          _PHANTOM: ${{ secrets.MK2_PHANTOM }}
          _PKX: ${{ secrets.MK2PKX }}
          _PK: ${{ secrets.MK2PK }}
        run: |
          # MK2PK key injection — checks primary names first, falls back to alternatives
          LOADED=0

          echo "========================================="
          echo "  MK2PK KEY INJECTION DIAGNOSTIC"
          echo "========================================="

          # --- MK2PK1 (Smooth511) ---
          if [ -n "$_PK1" ]; then
            echo "MK2PK1=$_PK1" >> "$GITHUB_ENV"
            LOADED=$((LOADED + 1))
            echo "✅ MK2PK1 loaded (Smooth511)"
          else
            echo "❌ MK2PK1 not found"
          fi

          # --- MK2PK2 (Smooth115) ---
          if [ -n "$_PK2" ]; then
            echo "MK2PK2=$_PK2" >> "$GITHUB_ENV"
            LOADED=$((LOADED + 1))
            echo "✅ MK2PK2 loaded (Smooth115)"
          else
            echo "❌ MK2PK2 not found"
          fi

          # --- MK2_PHANTOM_TOKEN (legacy) ---
          if [ -n "$_PHANTOM_TOKEN" ]; then
            echo "MK2_PHANTOM_TOKEN=$_PHANTOM_TOKEN" >> "$GITHUB_ENV"
            echo "✅ MK2_PHANTOM_TOKEN loaded"
          elif [ -n "$_PHANTOM" ]; then
            # Fallback: user may have named it MK2_PHANTOM instead of MK2_PHANTOM_TOKEN
            echo "MK2_PHANTOM_TOKEN=$_PHANTOM" >> "$GITHUB_ENV"
            echo "✅ MK2_PHANTOM loaded (as MK2_PHANTOM_TOKEN)"
          fi

          # --- Fallback: MK2PKX or MK2PK (if user created a single combined key) ---
          if [ "$LOADED" -eq 0 ]; then
            if [ -n "$_PKX" ]; then
              echo "MK2PK1=$_PKX" >> "$GITHUB_ENV"
              LOADED=$((LOADED + 1))
              echo "⚠️  MK2PKX found — loaded as MK2PK1. Consider renaming to MK2PK1/MK2PK2 for dual-account setup."
            elif [ -n "$_PK" ]; then
              echo "MK2PK1=$_PK" >> "$GITHUB_ENV"
              LOADED=$((LOADED + 1))
              echo "⚠️  MK2PK found — loaded as MK2PK1. Consider renaming to MK2PK1/MK2PK2 for dual-account setup."
            fi
          fi

          echo "========================================="
          echo "  Keys loaded: $LOADED"
          echo "========================================="

          if [ "$LOADED" -eq 0 ]; then
            echo ""
            echo "⚠️  NO KEYS FOUND. Secrets must be added to THIS repo."
            echo ""
            echo "  Go to: github.com/Smooth511/masterhq/settings/secrets/actions"
            echo "  Click: New repository secret"
            echo "  Add:   MK2PK1  (Smooth511 token)"
            echo "  Add:   MK2PK2  (Smooth115 token)"
            echo ""
            echo "  Secrets added to other repos (Claude-MKIIupd, Claude-MKII)"
            echo "  do NOT carry over. Each repo needs its own secrets."
            echo ""
          fi
