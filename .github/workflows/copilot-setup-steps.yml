## Copilot Cloud Agent Setup Steps
## Injects MK2PK keys into agent environment on launch
## MK2PK1 = Smooth511 full access | MK2PK2 = Smooth115 full access

steps:
  - name: Inject MK2PK keys
    env:
      _PK1: ${{ secrets.MK2PK1 }}
      _PK2: ${{ secrets.MK2PK2 }}
      _PHANTOM: ${{ secrets.MK2_PHANTOM_TOKEN }}
    run: |
      # MK2PK key injection — both keys available as env vars
      LOADED=0

      if [ -n "$_PK1" ]; then
        echo "MK2PK1=$_PK1" >> "$GITHUB_ENV"
        LOADED=$((LOADED + 1))
        echo "✅ MK2PK1 loaded"
      else
        echo "⚠️ MK2PK1 not found in secrets"
      fi

      if [ -n "$_PK2" ]; then
        echo "MK2PK2=$_PK2" >> "$GITHUB_ENV"
        LOADED=$((LOADED + 1))
        echo "✅ MK2PK2 loaded"
      else
        echo "⚠️ MK2PK2 not found in secrets"
      fi

      # Legacy phantom token (if still set)
      if [ -n "$_PHANTOM" ]; then
        echo "MK2_PHANTOM_TOKEN=$_PHANTOM" >> "$GITHUB_ENV"
        echo "✅ MK2_PHANTOM_TOKEN loaded"
      fi

      echo "Keys loaded: $LOADED"
